kind = "web"
previewPath = "/"
title = "Ekstre Analizi"
version = "1.0.0"
id = "artifacts/ekstre"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19646

[services.development]
run = "pnpm --filter @workspace/ekstre run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ekstre", "run", "build" ]
publicDir = "artifacts/ekstre/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19646"
BASE_PATH = "/"
